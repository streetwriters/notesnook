name: Release @notesnook/desktop (multi-window)

# Builds and publishes a desktop release from the feat/multi-window branch.
# Triggered automatically on every push to that branch.

on:
  push:
    branches:
      - feat/multi-window
    paths:
      - "apps/desktop/**"
      - "apps/web/**"
      - "packages/**"
      # re-run workflow if workflow file changes
      - ".github/workflows/desktop.multi-window.release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-multi-window-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build web bundle
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node-with-cache

      - name: Install packages
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit
          npm run bootstrap -- --scope=web
          npm run bootstrap -- --scope=desktop

      - name: Install sqlite-better-trigram for all arch
        run: |
          npm i --cpu arm64 sqlite-better-trigram
          npm i --cpu x64 sqlite-better-trigram
        working-directory: ./apps/desktop

      - name: Collect app metadata
        id: app_metadata
        working-directory: ./apps/desktop
        run: |
          echo "app_version=$(cat package.json | jq -r .version)" >> $GITHUB_OUTPUT

      - name: Generate desktop build
        run: npm run tx @notesnook/web:build:desktop

      - name: Build desktop bundle
        working-directory: ./apps/desktop
        run: npm run bundle

      - name: Archive build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: apps/web/build/**/*

  build-macos:
    name: Build for macOS (arm64)
    needs: build
    runs-on: macos-14
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node-with-cache

      - name: Install setuptools
        run: brew install python-setuptools

      - name: Collect app metadata
        id: app_metadata
        working-directory: ./apps/desktop
        run: |
          echo "app_version=$(cat package.json | jq -r .version)" >> $GITHUB_OUTPUT

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./apps/web/build

      - name: Install packages
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit
          npm run bootstrap -- --scope=desktop

      - name: Install sqlite-better-trigram for all arch
        run: |
          npm i --cpu arm64 sqlite-better-trigram
          npm i --cpu arm64 sqlite3-fts5-html
          npm i --cpu x64 sqlite-better-trigram
          npm i --cpu x64 sqlite3-fts5-html
        working-directory: ./apps/desktop

      - name: Build dmg
        env:
          CSC_LINK: ${{ secrets.mac_certs }}
          CSC_KEY_PASSWORD: ${{ secrets.mac_certs_password }}
          # Notarization disabled for branch builds; no signing will be performed.
          NOTARIZE: false
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run tx @notesnook/desktop:release
          cd apps/desktop
          yarn electron-builder --config=electron-builder.config.js --mac dmg --arm64 -p never

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: apps/desktop/output/*.dmg

  build-linux-x64:
    name: Build for Linux x64
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node-with-cache

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./apps/web/build

      - name: Install packages
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit
          npm run bootstrap -- --scope=desktop

      - name: Install sqlite-better-trigram for all arch
        run: |
          npm i --cpu x64 sqlite-better-trigram
          npm i --cpu x64 sqlite3-fts5-html
        working-directory: ./apps/desktop

      - name: Build Electron wrapper
        run: npm run tx @notesnook/desktop:release

      - name: Build AppImage
        run: yarn electron-builder --config=electron-builder.config.js --linux AppImage:x64 -p never
        working-directory: ./apps/desktop

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-build
          path: apps/desktop/output/*.AppImage

  build-linux-arm64:
    name: Build for Linux arm64
    needs: build
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node-with-cache

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./apps/web/build

      - name: Install packages
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit
          npm run bootstrap -- --scope=desktop

      - name: Install sqlite-better-trigram for all arch
        run: |
          npm i --cpu arm64 sqlite-better-trigram
          npm i --cpu arm64 sqlite3-fts5-html
        working-directory: ./apps/desktop

      - name: Build Electron wrapper
        run: npm run tx @notesnook/desktop:release

      - name: Build AppImage
        run: yarn electron-builder --config=electron-builder.config.js --linux AppImage:arm64 -p never
        working-directory: ./apps/desktop

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-build
          path: apps/desktop/output/*.AppImage

  build-windows:
    name: Build for Windows
    needs: build
    runs-on: windows-2022
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node-with-cache

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: ./apps/web/build

      - name: Install packages
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit
          npm run bootstrap -- --scope=desktop

      - name: Install sqlite-better-trigram for all arch
        run: |
          npm i --cpu arm64 sqlite-better-trigram
          npm i --cpu x64 sqlite-better-trigram

          npm i --cpu arm64 sqlite3-fts5-html
          npm i --cpu x64 sqlite3-fts5-html
        working-directory: ./apps/desktop

      - name: Build
        run: node scripts/execute.mjs @notesnook/desktop:release

      - name: Build installer (unsigned)
        env:
          NOTESNOOK_STAGING: true
        run: yarn electron-builder --config=electron-builder.config.js --win nsis:x64 --publish never
        working-directory: ./apps/desktop

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: apps/desktop/output/*.exe

  publish-release:
    name: Publish GitHub prerelease
    needs:
      - build
      - build-macos
      - build-linux-x64
      - build-linux-arm64
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Collect app metadata
        id: app_metadata
        working-directory: ./apps/desktop
        run: |
          echo "app_version=$(cat package.json | jq -r .version)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Stage release files
        run: |
          mkdir -p ./release
          find ./artifacts -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.exe" \) -exec cp {} ./release/ \;
          ls -la ./release

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: multi-window-v${{ steps.app_metadata.outputs.app_version }}-${{ github.run_number }}
          name: Notesnook Desktop (multi-window) v${{ steps.app_metadata.outputs.app_version }} #${{ github.run_number }}
          body: |
            Automated prerelease build from the `feat/multi-window` branch.

            **Commit:** ${{ github.sha }}
            **Run:** ${{ github.run_number }}

            > ⚠️ This is an unsigned pre-release build for testing the multi-window feature. It is not intended for production use.
          prerelease: true
          target_commitish: ${{ github.ref }}
          files: ./release/*
          fail_on_unmatched_files: true
