name: Notesnook iOS Preview Build

# UNTRUSTED stage. Runs on `pull_request`, so fork code is checked out and
# compiled with a read-only GITHUB_TOKEN and NO repository secrets. It only
# produces an *unsigned* archive. Signing, Firebase distribution and PR
# comments happen in ios.preview.publish.yml, which runs in the trusted
# `workflow_run` context and never executes fork code. Because no secrets are
# exposed here, the build runs automatically for every PR (including forks)
# with no authorization gate.

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [master, beta]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - ".github/workflows/ios.preview.build.yml"
      - ".github/workflows/ios.preview.publish.yml"

# A fork that spams pushes shouldn't queue up macOS builds.
concurrency:
  group: ios-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: ./.github/actions/setup-node-with-cache

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.1.1"

      # Xcode 26 ships without the iOS platform on the runner image, so it must
      # be installed before archiving. `-downloadPlatform iOS` downloads AND
      # installs in one shot; the old two-step (-exportPath then -importPlatform
      # of a simulator dmg) is what randomly died with "Unable to connect to
      # simulator" (exit 70), so it's gone. Probe with xcrun (authoritative --
      # `xcodebuild -showsdks | grep` gives false positives) and retry the
      # download, since it hits Apple's CDN and is intermittently flaky.
      # The iOS platform must be downloaded AND imported: `-downloadPlatform`
      # only fetches the dmg to -exportPath, `-importPlatform` is what actually
      # installs it. Skipping the import makes the archive fail with "iOS 26.1
      # Platform Not Installed".
      #
      # Don't try to detect whether it's already installed first: both
      # `xcodebuild -showsdks` and `xcrun --sdk iphoneos --show-sdk-version`
      # report "iOS 26.1 / iphoneos26.1" from the SDK stub bundled with Xcode
      # even when the platform is absent, so any such probe false-positives.
      - name: Ensure iOS platform is installed
        run: |
          set -uo pipefail
          DL_DIR="$RUNNER_TEMP/ios-platform"
          mkdir -p "$DL_DIR"

          # Download the platform dmg. Hits Apple's CDN, so retry.
          for attempt in 1 2 3; do
            echo "::group::xcodebuild -downloadPlatform iOS (attempt $attempt)"
            xcodebuild -downloadPlatform iOS -exportPath "$DL_DIR"
            status=$?
            echo "::endgroup::"
            [ $status -eq 0 ] && break
            echo "Download attempt $attempt failed (exit $status); retrying in 30s..."
            sleep 30
          done

          # Discover the dmg instead of hardcoding a filename like
          # iphonesimulator_26.1_23B86.dmg, which breaks whenever Apple ships a
          # new build number.
          DMG="$(find "$DL_DIR" -maxdepth 1 -name '*.dmg' | head -n1)"
          if [ -z "$DMG" ]; then
            echo "::error::No iOS platform dmg was downloaded into $DL_DIR"
            ls -la "$DL_DIR" || true
            exit 1
          fi
          echo "Importing $DMG"

          # This is the step that randomly dies with "Unable to connect to
          # simulator" (exit 70) when CoreSimulator is wedged. Bounce those
          # services between attempts and retry.
          for attempt in 1 2 3; do
            echo "::group::xcodebuild -importPlatform (attempt $attempt)"
            xcodebuild -importPlatform "$DMG"
            status=$?
            echo "::endgroup::"
            if [ $status -eq 0 ]; then
              echo "iOS platform installed."
              exit 0
            fi
            echo "Import attempt $attempt failed (exit $status); resetting CoreSimulator and retrying in 30s..."
            sudo killall -9 com.apple.CoreSimulator.CoreSimulatorService 2>/dev/null || true
            sudo killall -9 simdiskimaged 2>/dev/null || true
            sleep 30
          done
          echo "::error::Failed to import the iOS platform after 3 attempts"
          exit 1

      - name: Install node modules
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit
          npm run bootstrap -- --scope=mobile

      - name: Build packages
        run: npm run tx @notesnook/mobile:build

      - name: Cache Pods
        uses: actions/cache@v4
        id: pods-cache
        with:
          path: apps/mobile/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}

      - name: Install Pods
        run: |
          cd apps/mobile/ios
          pod install

      - name: Check for typescript errors
        run: |
          npm run tx mobile:build
          cd apps/mobile
          npx tsc --noEmit

      - name: Get marketing version
        id: marketing-version
        run: echo "version=$(grep "IOS_MARKETING_VERSION" apps/mobile/ios/build-configs/ios-build.staging.xcconfig | awk -F'=' '{print $2}' | xargs)" >> $GITHUB_OUTPUT

      - name: Get build number
        id: build-number
        run: echo "timestamp=$(($(date +%s) - 1774851180 ))" >> $GITHUB_OUTPUT

      - name: Make staging xcconfig active
        run: |
          cd apps/mobile/ios/build-configs
          ./use-ios-build-config.sh staging --marketing-version ${{steps.marketing-version.outputs.version}} --build-number ${{steps.build-number.outputs.timestamp}}

      # Archive WITHOUT signing. No certificates or secrets are present in this
      # job. The trusted publish workflow re-signs and exports this archive;
      # `-exportArchive` only packages/signs and does NOT re-run the app's build
      # phases, so fork code never runs alongside secrets.
      - name: Archive (unsigned)
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace apps/mobile/ios/Notesnook.xcworkspace \
            -scheme Notesnook \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Notesnook.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            archive

      - name: Stage build artifact
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/artifact"
          tar -czf "$RUNNER_TEMP/artifact/Notesnook.xcarchive.tar.gz" \
            -C "$RUNNER_TEMP" Notesnook.xcarchive
          # Carry the PR context forward; workflow_run cannot see it reliably for forks.
          {
            echo "PR_NUMBER=${{ github.event.pull_request.number }}"
            echo "HEAD_SHA=${{ github.event.pull_request.head.sha }}"
          } > "$RUNNER_TEMP/artifact/pr-meta.env"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-preview-build
          path: ${{ runner.temp }}/artifact
          if-no-files-found: error
          retention-days: 1
